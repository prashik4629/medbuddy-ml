services:
  - type: web
    name: medbuddy-ml-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PROJECT_ROOT
        value: /opt/render/project/src
      - key: API_KEY
        value: medbuddy-dev-key-change-in-production